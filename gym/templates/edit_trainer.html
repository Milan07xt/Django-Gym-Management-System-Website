{% extends 'navigation.html' %}

{% block body %}
<div class="container py-4">
    <div class="card p-4">
        <h3 class="text-center">Edit Trainer</h3>
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ trainer.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="emailid" class="form-control" value="{{ trainer.emailid }}" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="contact" class="form-control" value="{{ trainer.contact }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dob" class="form-control"
                        value="{% if trainer.dob %}{{ trainer.dob|date:'Y-m-d' }}{% endif %}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select name="gender" class="form-control">
                    <option value="Male" {% if trainer.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if trainer.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if trainer.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Join Date</label>
                <input type="date" name="join_date" class="form-control"
                    value="{% if trainer.join_date %}{{ trainer.join_date|date:'Y-m-d' }}{% endif %}">
            </div>

            <div class="mb-3">
                <label class="form-label">Salary</label>
                <input type="number" step="0.01" name="salary" class="form-control" value="{{ trainer.salary }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Shift</label>
                <select name="shift" class="form-control">
                    <option value="Morning" {% if trainer.shift == 'Morning' %}selected{% endif %}>Morning</option>
                    <option value="Evening" {% if trainer.shift == 'Evening' %}selected{% endif %}>Evening</option>
                    <option value="Full Day" {% if trainer.shift == 'Full Day' %}selected{% endif %}>Full Day</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Specialty</label>
                <select name="specialty" class="form-control">
                    <option value="None" {% if trainer.specialty == 'None' %}selected{% endif %}>None</option>
                    <option value="Yoga" {% if trainer.specialty == 'Yoga' %}selected{% endif %}>Yoga</option>
                    <option value="CrossFit" {% if trainer.specialty == 'CrossFit' %}selected{% endif %}>CrossFit
                    </option>
                    <option value="Bodybuilding" {% if trainer.specialty == 'Bodybuilding' %}selected{% endif %}>
                        Bodybuilding</option>
                    <option value="Weightlifting" {% if trainer.specialty == 'Weightlifting' %}selected{% endif %}>
                        Weightlifting</option>
                    <option value="Cardio" {% if trainer.specialty == 'Cardio' %}selected{% endif %}>Cardio</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Save Changes</button>
                <a href="{% url 'view_trainer' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
